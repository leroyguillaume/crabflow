name: Docker

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

on:
  push:
    branches: ['**']
    tags: [v*]
    paths:
    - .github/workflows/docker.yml
    - .dockerignore
    - '**/resources/**'
    - '**.rs'
    - '!examples/**.rs'
    - Cargo.lock
    - Cargo.toml
    - Dockerfile
  workflow_dispatch:

jobs:
  docker:
    name: Docker
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
        - builder
        - git-synchronizer
        - migrator
        - scheduler
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      if: startsWith(github.event.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
      uses: docker/login-action@v3
      with:
        username: ${{ vars.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Get image metadata
      id: metadata
      uses: docker/metadata-action@v4
      with:
        images: |
          ${{ vars.DOCKERHUB_USERNAME }}/crabflow-${{ matrix.target }}
        tags: |
          type=ref,event=tag
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}
          type=semver,pattern={{major}}.{{minor}}
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build & push
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        tags: ${{ steps.metadata.outputs.tags }}
        labels: ${{ steps.metadata.outputs.labels }}
        target: ${{ matrix.target }}
        push: ${{ startsWith(github.event.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
