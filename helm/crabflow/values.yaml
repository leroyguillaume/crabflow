# Default values for crabflow.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

nameOverride: ""
fullnameOverride: ""

database:
  host: crabflow-postgresql
  secret:
    name: crabflow-postgresql
    key: password

imagePullSecrets: []

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

builder:
  enabled: true

  nameOverride: ""
  fullnameOverride: ""

  replicaCount: 1

  image:
    repository: gleroy/crabflow-builder
    pullPolicy: Always
    # Overrides the image tag whose default is the chart appVersion.
    tag: ""

  dockerUrl: tcp://127.0.0.1:2375
  registry: ""
  workflowsDir: /var/lib/crabflow/workflows/examples

  command: []
  args: []

  env: []

  podAnnotations: {}

  podLabels: {}

  nodeSelector: {}

  tolerations: []

  affinity: {}

  securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true

  podSecurityContext:
    runAsUser: 1000
    fsGroup: 1000

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 100
    targetCPUUtilizationPercentage: 80
    # targetMemoryUtilizationPercentage: 80

  resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

  # Additional volumes on the output Deployment definition.
  volumes:
  - name: workflows
    emptyDir: {}

  extraVolumes: []

  # Additional volumeMounts on the output Deployment definition.
  volumeMounts:
  - name: workflows
    mountPath: /var/lib/crabflow/workflows
    readOnly: false

  extraVolumeMounts: []

  docker:
    enabled: true

    image:
      repository: docker
      pullPolicy: IfNotPresent
      tag: 24-dind-rootless

    tls: false

    command: []
    args: []

    env: []

    securityContext:
      privileged: true
    # capabilities:
    #   drop:
    #   - ALL
    # readOnlyRootFilesystem: true
    # runAsNonRoot: true
    # runAsUser: 1000

    resources: {}
    # We usually recommend not to specify default resources and to leave this as a conscious
    # choice for the user. This also increases chances charts run on environments with little
    # resources, such as Minikube. If you do want to specify resources, uncomment the following
    # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
    # limits:
    #   cpu: 100m
    #   memory: 128Mi
    # requests:
    #   cpu: 100m
    #   memory: 128Mi

    # Additional volumeMounts on the output Deployment definition.
    volumeMounts: []
    # - name: foo
    #   mountPath: "/etc/foo"
    #   readOnly: true

    extraVolumeMounts: []

  gitSynchronizer:
    enabled: true

    image:
      repository: gleroy/crabflow-git-synchronizer
      pullPolicy: IfNotPresent
      tag: ""

    repository: https://github.com/leroyguillaume/crabflow

    command: []
    args: []

    env: []

    securityContext: {}
    # capabilities:
    #   drop:
    #   - ALL
    # readOnlyRootFilesystem: true
    # runAsNonRoot: true

    resources: {}
    # We usually recommend not to specify default resources and to leave this as a conscious
    # choice for the user. This also increases chances charts run on environments with little
    # resources, such as Minikube. If you do want to specify resources, uncomment the following
    # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
    # limits:
    #   cpu: 100m
    #   memory: 128Mi
    # requests:
    #   cpu: 100m
    #   memory: 128Mi

    # Additional volumeMounts on the output Deployment definition.
    volumeMounts:
    - name: workflows
      mountPath: /var/lib/crabflow/workflows
      readOnly: false

    extraVolumeMounts: []

migrator:
  image:
    repository: gleroy/crabflow-migrator
    pullPolicy: IfNotPresent
    tag: ""

  command: []
  args: []

  env: []

  securityContext: {}
    # capabilities:
    #   drop:
    #   - ALL
    # readOnlyRootFilesystem: true
    # runAsNonRoot: true

  resources: {}
    # We usually recommend not to specify default resources and to leave this as a conscious
    # choice for the user. This also increases chances charts run on environments with little
    # resources, such as Minikube. If you do want to specify resources, uncomment the following
    # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
    # limits:
    #   cpu: 100m
    #   memory: 128Mi
    # requests:
    #   cpu: 100m
    #   memory: 128Mi

  # Additional volumeMounts on the output Deployment definition.
  volumeMounts: []
  # - name: foo
  #   mountPath: "/etc/foo"
  #   readOnly: true

  extraVolumeMounts: []

# https://github.com/bitnami/charts/blob/main/bitnami/postgresql/values.yaml
postgresql:
  enabled: true

  global:
    postgresql:
      auth:
        username: crabflow
        database: crabflow
